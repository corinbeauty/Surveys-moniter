<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手舞足道集團 - 稽核監控中心 V1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #0f172a; color: white; }
        .store-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .store-card:hover { transform: translateY(-5px); background-color: rgba(255, 255, 255, 0.1); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .compact-table th, .compact-table td { 
            padding: 0.5rem 0.25rem !important; 
            border-bottom: 1px solid #e2e8f0;
            font-size: 11px;
        }
        .q-col { min-width: 50px; text-align: center; font-weight: 800; font-size: 10px; }
        
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .status-alarm { animation: pulse-red 1s infinite; background-color: #ef4444 !important; }

        /* 確保 Toast 永遠在最前端，完全不被遮擋 */
        #toastContainer {
            z-index: 99999 !important;
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            pointer-events: none;
            width: 100%;
        }
        .toast-item {
            pointer-events: auto;
            animation: slideDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* 密碼輸入框的高對比樣式 */
        .high-contrast-input {
            background-color: #ffffff !important;
            border: 3px solid #1e293b !important; /* 深藍黑色邊框 */
            color: #0f172a !important;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.1);
        }
        .high-contrast-input:focus {
            border-color: #2563eb !important;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

<div id="toastContainer"></div>

<div id="portalPage" class="p-6 md:p-12 max-w-7xl mx-auto min-h-screen flex flex-col justify-center">
    <div class="text-center mb-12">
        <h1 class="text-5xl font-black tracking-tighter text-white mb-3 italic uppercase">手舞足道集團</h1>
        <div class="flex items-center justify-center gap-3">
            <span class="h-[1px] w-12 bg-blue-500"></span>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.3em]">稽核監控系統 · V1.0</p>
            <span class="h-[1px] w-12 bg-blue-500"></span>
        </div>
    </div>

    <div id="storeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
        <!-- 門市按鈕由 JS 動態生成 -->
    </div>
</div>

<div id="dashboardPage" class="hidden min-h-screen bg-slate-50 text-slate-900">
    <header class="bg-white border-b sticky top-0 z-40 p-4 shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="backToPortal()" class="p-2 hover:bg-slate-100 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </button>
            <div>
                <h2 id="currentStoreTitle" class="text-xl font-black italic text-slate-900">門市名稱</h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Live Monitoring Terminal</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div id="syncIndicator" class="flex items-center gap-2 px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-black border border-green-100">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                SYNCING DATA
            </div>
            <button onclick="location.reload()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-black transition">登出系統</button>
        </div>
    </header>

    <main class="p-4 md:p-6 max-w-[1900px] mx-auto">
        <!-- 統計卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-5 rounded-2xl border shadow-sm">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-1">本月稽核總量</p>
                <h3 id="statTotal" class="text-3xl font-black text-slate-900 italic">0</h3>
            </div>
            <div id="alarmBox" class="bg-white p-5 rounded-2xl border shadow-sm transition-colors">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-1 text-red-500">異常待處置</p>
                <h3 id="statAlarm" class="text-3xl font-black text-red-600 italic">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl border shadow-sm md:col-span-2 overflow-hidden">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-1">師傅表現快報 (★/📝)</p>
                <div id="masseurStatsList" class="flex gap-2 overflow-x-auto pb-1"></div>
            </div>
        </div>

        <!-- 數據表格 -->
        <div class="bg-white rounded-3xl border shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse compact-table min-w-[1400px]">
                    <thead class="bg-slate-50 border-b">
                        <tr id="tableHeaderRow">
                            <!-- 標題動態產生 -->
                        </tr>
                    </thead>
                    <tbody id="reportTableBody" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="loginModal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-xl hidden items-center justify-center z-[10010]">
    <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm text-center border-t-[12px] border-blue-600 relative">
        <div class="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-6 transform -rotate-12 shadow-lg">
            <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        
        <h2 id="loginModalTitle" class="text-3xl font-black text-slate-900 mb-1">中港行館</h2>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-8">Security Verification Required</p>
        
        <!-- 密碼輸入區域 -->
        <div class="text-left mb-6">
            <label class="block text-[11px] font-black text-slate-900 uppercase tracking-widest mb-2 px-1">Access Password</label>
            <input type="password" id="passwordInput" placeholder="請輸入管理密碼" 
                   class="high-contrast-input w-full p-5 rounded-2xl text-center text-3xl font-black transition outline-none placeholder:text-slate-200">
        </div>

        <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl hover:bg-blue-700 active:scale-95 transition shadow-xl shadow-blue-200 text-lg">授權並進入系統</button>
        
        <button onclick="closeLoginModal()" class="w-full text-slate-400 text-xs font-bold mt-6 hover:text-slate-900 transition underline underline-offset-4">取消返回門戶</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBY2RVaNjkKMJJAdm3_uLeiBhcDaXZEhFY",
        authDomain: "surveys2-ff8a8.firebaseapp.com",
        projectId: "surveys2-ff8a8",
        storageBucket: "surveys2-ff8a8.firebasestorage.app",
        messagingSenderId: "147800559221",
        appId: "1:147800559221:web:18df683290fee3324fb23c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const stores = [
        { id: 'zhonggang', name: '中港行館', pw: 'zg888' },
        { id: 'yuanlin', name: '員林行館', pw: 'yl888' },
        { id: 'zhongqing', name: '中清行館', pw: 'zq888' },
        { id: 'dali', name: '大里行館', pw: 'dl888' },
        { id: 'zhongke', name: '中科行館', pw: 'zk888' },
        { id: 'shalu', name: '沙鹿行館', pw: 'sl888' },
        { id: 'aihe', name: '愛河行館', pw: 'ah888' },
        { id: 'fengshan', name: '鳳山行館', pw: 'fs888' },
        { id: 'zuoying', name: '左營行館', pw: 'zy888' },
        { id: 'sanduo', name: '三多行館', pw: 'sd888' },
        { id: 'art', name: '美術館行館', pw: 'at888' },
        { id: 'fucian', name: '府前行館', pw: 'fc888' },
        { id: 'anping', name: '安平行館', pw: 'ap888' },
        { id: 'xinsheng', name: '新生行館', pw: 'xs888' },
        { id: 'xinyi', name: '信義行館', pw: 'xy888' },
        { id: 'zhongli', name: '中壢行館', pw: 'zl888' },
        { id: 'zhubei', name: '竹北行館', pw: 'zb888' },
        { id: 'taiping', name: '太平店', pw: 'tp888' },
        { id: 'fengyuan', name: '豐原行館', pw: 'fy888' },
        { id: 'dongxing', name: '東興店', pw: 'dx888' },
        { id: 'wuquan', name: '五權店', pw: 'wq888' },
        { id: 'pasha', name: '帕夏健髮-公益店', pw: 'ps888' },
        { id: 'jing', name: '婧仕女微旅', pw: 'jn888' }
    ];

    const storeSpecificLabels = {
        'pasha': { q1:"流程介紹", q2:"洗髮力道", q3:"異味/煙味", q4:"時間掌握", q5:"服務禮貌", q6:"肢體觸碰", q7:"禁動項目", q8:"打卡推廣", q9:"產品建議", q10:"回訪意願" },
        'jing': { q1:"流程說明", q2:"SPA力道", q3:"環境氣味", q4:"時間掌握", q5:"服務禮貌", q6:"隱私保護", q7:"禁動項目", q8:"打卡推廣", q9:"名片提供", q10:"回訪預約" },
        'default': { q1:"開始介紹", q2:"按摩力道", q3:"異味/煙味", q4:"時間掌握", q5:"服務禮貌", q6:"肢體觸碰", q7:"禁止動作", q8:"打卡推廣", q9:"提供名片", q10:"老點意願" }
    };

    const negKeywords = ["完全沒問", "完全不問", "味道很重", "感覺很差", "言語不當", "非常危險", "完全沒說", "沒有給名片", "絕對不會", "不願意"];

    let currentStore = null;
    let rawData = [];

    window.onload = () => {
        const grid = document.getElementById('storeGrid');
        stores.forEach(store => {
            const btn = document.createElement('button');
            btn.className = 'store-card glass-panel p-6 rounded-3xl flex flex-col items-center justify-center gap-3 hover:bg-blue-600 group';
            btn.innerHTML = `
                <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center group-hover:bg-white/20">
                    <svg class="w-6 h-6 text-slate-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-10V4m0 10V4m0 10h1m-1 4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                </div>
                <span class="text-sm font-black tracking-tighter group-hover:text-white">${store.name}</span>
            `;
            btn.onclick = () => openLoginModal(store);
            grid.appendChild(btn);
        });

        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    };

    window.openLoginModal = (store) => {
        currentStore = store;
        document.getElementById('loginModalTitle').innerText = store.name;
        document.getElementById('loginModal').classList.remove('hidden');
        document.getElementById('loginModal').classList.add('flex');
        document.getElementById('passwordInput').value = '';
        setTimeout(() => document.getElementById('passwordInput').focus(), 100);
    };

    window.closeLoginModal = () => {
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('loginModal').classList.remove('flex');
    };

    window.handleLogin = () => {
        const input = document.getElementById('passwordInput').value;
        if (input === currentStore.pw || input === 'master888') {
            showToast('✅ 授權成功，正在同步數據...', 'bg-green-600');
            document.getElementById('portalPage').classList.add('hidden');
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('currentStoreTitle').innerText = currentStore.name;
            startSync();
        } else {
            showToast('❌ 密碼錯誤，請重新確認', 'bg-red-600');
            const inp = document.getElementById('passwordInput');
            inp.value = '';
            inp.classList.add('shake'); // 可以在CSS加震動動畫
            setTimeout(() => inp.classList.remove('shake'), 500);
        }
    };

    function showToast(msg, bg) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast-item ${bg} text-white px-8 py-5 rounded-[1.5rem] shadow-2xl font-black text-xl flex items-center gap-3 border-4 border-white/30`;
        toast.innerHTML = `<span>🚨</span> ${msg}`;
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    function startSync() {
        const path = `surveys/${currentStore.id}/records`;
        const q = query(collection(db, path), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            rawData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderDashboard();
        }, (err) => {
            console.error("Firebase Error:", err);
            showToast("系統連線失敗，請重試", "bg-orange-600");
        });
    }

    function renderDashboard() {
        const body = document.getElementById('reportTableBody');
        const activeLabels = storeSpecificLabels[currentStore.id] || storeSpecificLabels.default;
        
        const headerRow = document.getElementById('tableHeaderRow');
        headerRow.innerHTML = `
            <th class="w-10 text-center">序</th>
            <th class="w-32">服務日期</th>
            <th class="w-16 text-center">師傅</th>
            ${Object.entries(activeLabels).map(([key, label]) => {
                const isRed = ['q8', 'q9', 'q10'].includes(key);
                return `<th class="q-col ${isRed ? 'text-red-600 bg-red-50/50' : 'text-blue-600 bg-blue-50/50'}">${label}</th>`;
            }).join('')}
            <th class="w-16 text-center">狀態</th>
            <th class="min-w-[150px]">備註</th>
        `;

        if (rawData.length === 0) {
            body.innerHTML = '<tr><td colspan="20" class="py-20 text-center text-slate-400 font-black italic uppercase">No Data Found</td></tr>';
            return;
        }

        let pendingCount = 0;
        body.innerHTML = rawData.map((d, index) => {
            const ratings = d.ratings || {};
            const isAlarm = Object.entries(ratings).some(([k, v]) => !['q8', 'q9'].includes(k) && negKeywords.includes(v)) && d.adminStatus !== 'resolved';
            if (isAlarm) pendingCount++;

            return `
                <tr class="${isAlarm ? 'bg-red-50/50' : ''}">
                    <td class="text-center font-bold text-slate-300">${index + 1}</td>
                    <td class="font-mono text-[10px]">${d.serviceDate || '-'}</td>
                    <td class="text-center"><span class="bg-slate-800 text-white px-2 py-0.5 rounded italic font-black">${d.masseurId || '??'}</span></td>
                    ${Object.keys(activeLabels).map(k => {
                        const val = ratings[k] || '-';
                        const isNeg = negKeywords.includes(val);
                        return `<td class="q-col ${isNeg ? 'text-red-600 font-black' : 'text-slate-500'}">${val}</td>`;
                    }).join('')}
                    <td class="text-center">
                        <span class="px-2 py-1 rounded-full text-[9px] font-black text-white ${d.adminStatus === 'resolved' ? 'bg-blue-500' : (isAlarm ? 'status-alarm' : 'bg-green-500')}">
                            ${d.adminStatus === 'resolved' ? '完成' : (isAlarm ? '異常' : '正常')}
                        </span>
                    </td>
                    <td class="text-[10px] text-slate-400 italic">${d.adminRemark || '無'}</td>
                </tr>
            `;
        }).join('');

        document.getElementById('statTotal').innerText = rawData.length;
        document.getElementById('statAlarm').innerText = pendingCount;
        document.getElementById('alarmBox').className = pendingCount > 0 ? 'bg-red-50 p-5 rounded-2xl border border-red-200 shadow-sm animate-pulse' : 'bg-white p-5 rounded-2xl border shadow-sm';
        
        updateMasseurStats();
    }

    function updateMasseurStats() {
        const stats = {};
        rawData.forEach(d => {
            const mid = d.masseurId || '未知';
            if (!stats[mid]) stats[mid] = { stars: 0, reviews: 0 };
            if (d.marketingAction === 'Reviewed') stats[mid].stars++;
            if (d.suggestions && d.suggestions.length > 5) stats[mid].reviews++;
        });

        document.getElementById('masseurStatsList').innerHTML = Object.entries(stats).map(([id, s]) => `
            <div class="flex items-center gap-2 bg-slate-50 border border-slate-100 px-3 py-1.5 rounded-xl shrink-0">
                <span class="text-[10px] font-black text-slate-900">#${id}</span>
                <span class="text-[11px] font-black text-amber-500">${s.stars}★</span>
                <span class="text-[11px] font-black text-blue-500">${s.reviews}📝</span>
            </div>
        `).join('');
    }

    window.backToPortal = () => {
        document.getElementById('dashboardPage').classList.add('hidden');
        document.getElementById('portalPage').classList.remove('hidden');
        rawData = [];
    };

</script>
</body>
</html>
